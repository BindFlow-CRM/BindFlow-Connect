kind = "web"
previewPath = "/"
title = "BindFlow CRM"
version = "1.0.0"
id = "artifacts/bindflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23796

[services.development]
run = "pnpm --filter @workspace/bindflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bindflow", "run", "build" ]
publicDir = "artifacts/bindflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23796"
BASE_PATH = "/"
